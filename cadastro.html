<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpliPet. - Sistema de Gestão</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg pt-4">
        <div class="container px-4">
           <a class="navbar-brand text-green" href="index.html" >
                <strong>SimpliPet.</strong><br>
                <small class="text-muted text-uppercase" style="font-size: 0.6rem; letter-spacing: 1px;">Gestão de Pet
                    Shopr</small>
            </a>
            <div class="ms-auto">
                <ul class="nav nav-pills">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro.html">Cadastrar</a></li>
                    <li class="nav-item"><a class="nav-link" href="edicao.html">Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="adm.html">Painel</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container px-4 mt-4 mb-5">
        <div class="mb-4">
            <h2 class="text-green fw-bold">Cadastrar Cliente</h2>
            <p class="text-muted">Registre os dados do tutor e de cada cachorro que ele traz ao pet shop.</p>
        </div>

        <div class="card p-4 bg-light border shadow-sm">
            <h5 class="fw-bold mb-3">Dados do Tutor</h5>
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Nome Completo *</label>
                    <input type="text" class="form-control" placeholder="Ex: Ricardo Silva">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">E-mail *</label>
                    <input type="email" class="form-control" placeholder="Ex: cliente@email.com">
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Telefone *</label>
                    <input type="text" class="form-control" placeholder="(11) 99999-0000">
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0">Cachorros do Tutor</h5>
                <button class="btn btn-sm btn-outline-green">+ Adicionar outro pet</button>
            </div>

            <div class="p-3 bg-white rounded border mb-4">
                <div class="text-muted small mb-2 fw-bold">PET 01</div>
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label class="form-label small">Foto do Pet</label>
                        <input type="file" class="form-control form-control-sm" accept="image/*">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Nome *</label>
                        <input type="text" class="form-control" placeholder="Nome do pet">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Raça *</label>
                        <input type="text" class="form-control" placeholder="Ex: Beagle">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Idade</label>
                        <input type="text" class="form-control" placeholder="Ex: 4 anos">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small">Peso</label>
                        <input type="text" class="form-control" placeholder="Ex: 12kg">
                    </div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <label class="form-label small">Observações</label>
                        <textarea class="form-control" rows="2" placeholder="Alergias, temperamento..."></textarea>
                    </div>
                </div>
            </div>

            <div>
                <button class="btn btn-green px-4">Salvar Cliente</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
